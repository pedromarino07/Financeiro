<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerenciador de Finanças</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
                <i data-lucide="bar-chart-3" style="width: 32px; height: 32px;"></i>
                <span style="font-size: 1.5rem;">Gestor Finanças</span>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="exemplo@email.com" required>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>
                <button type="submit" id="btn-login">Entrar</button>
            </form>
            
            <div id="login-error" class="error-message" style="display: none;">
                Email ou senha incorretos.
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();

        // Script de Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const errorDiv = document.getElementById('login-error');
            const btnLogin = document.getElementById('btn-login');
            
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="spinner"></span> Entrando...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, senha })
                });

                if (response.ok) {
                    const usuario = await response.json();
                    
                    // Salvar no sessionStorage para apagar ao fechar a aba
                    sessionStorage.setItem('usuarioId', usuario.id);
                    sessionStorage.setItem('usuario_nome', usuario.nome);
                    
                    // Redirecionar para o dashboard
                    window.location.href = 'index.html';
                } else {
                    errorDiv.style.display = 'block';
                    Swal.fire({
                        icon: 'error',
                        title: 'Erro de Login',
                        text: 'E-mail ou senha incorretos.',
                        background: '#1a1a1a',
                        color: '#fff',
                        confirmButtonColor: '#3d5afe'
                    });
                }
            } catch (error) {
                console.error('Erro ao fazer login:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Erro de Conexão',
                    text: 'Não foi possível conectar ao servidor.',
                    background: '#1a1a1a',
                    color: '#fff',
                    confirmButtonColor: '#3d5afe'
                });
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = 'Entrar';
            }
        });

        // Se já estiver logado (nesta sessão), vai direto pro index
        if (sessionStorage.getItem('usuarioId') && sessionStorage.getItem('usuario_nome')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
